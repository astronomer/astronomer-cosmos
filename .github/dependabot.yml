version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    reviewers:
      - "@astronomer/oss-integrations"

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
    reviewers:
      - "@astronomer/oss-integrations"
