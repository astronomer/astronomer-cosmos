name: 'multi_folder_jaffle_shop'

config-version: 2
version: '0.1'

profile: 'default'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
analysis-paths: ["analysis"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
    - "target"
    - "dbt_modules"
    - "logs"

require-dbt-version: [">=1.0.0", "<2.0.0"]



vars:
  # Which folder(s) each folder depends on. Keys and values use full path: models/<subdir> or seeds.
  folder_dependencies:
    models/production: [models/staging]
    models/staging: [seeds]
  # Node names per folder (for ref() in inject_folder_dependencies). Can be overridden at runtime via generate_folder_vars.py.
  #dbt_nodes_by_folder:
  #  seeds: [raw_customers, raw_orders, raw_payments]
  #  models/staging: [stg_customers, stg_orders, stg_payments]
  #  models/production: [customers, orders]


models:
  multi_folder_jaffle_shop:
    +pre-hook: "{{ inject_folder_dependencies() }}"

    +materialized: table
    staging:
      +materialized: view
    production:
      +materialized: table
